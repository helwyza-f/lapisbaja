services:
  # Database PostgreSQL
  db:
    image: postgres:16-alpine
    container_name: lapisbaja_db
    restart: always
    environment:
      POSTGRES_USER: devuser
      POSTGRES_PASSWORD: devpassword
      POSTGRES_DB: lapisbaja_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # Redis untuk caching
  cache:
    image: redis:7-alpine
    container_name: lapisbaja_redis
    restart: always
    ports:
      - "6379:6379"

volumes:
  postgres_data:
